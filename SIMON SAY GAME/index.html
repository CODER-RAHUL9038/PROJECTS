<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindMatrix</title>
    <link rel="icon" type="image/jpeg" href="asset/simon-1.jpg">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="asset/simon-1.jpg">
</head>
<body>
    <h1 >MindMatrix</h1><br>
    <h2 >Press Any Key Or Tap To Start  </h2>
    <h3></h3>
    <div class="btn-container">
        <div class="line-one">
            <div  class="btn red" id="red" type = "button" ></div>
            <div class="btn yellow" id="yellow" type = "button"></div>
        </div>
        <div class="line-two">
            <div class="btn green" id="green" type = "button"></div>
            <div class="btn purple" id="purple" type = "button"></div>
        </div>
    </div>
    <div id="celebration-gif"></div>
   <div><h4>© Designed By Rahul</h4></div>
    

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((reg) => console.log('Service Worker registered', reg))
                    .catch((err) => console.log('Service Worker registration failed', err));
            });
        }
    </script>
</body>
</html>
